spack:
  config:
    install_tree:
      root: $spack/..
      projections:
        all: '{compiler.name}-{compiler.version}/{name}-{version}-{hash}'
    misc_cache: $spack/../misc_cache
    test_stage: $spack/../test_stage
    build_stage::
    - $spack/../build_stage

  # Regular TPLs do not need views
  view: false

  include:
    - ../defaults.yaml
    - ../versions.yaml

  toolchains:
    rocm_6_2_1:
    - spec: '%c=rocmcc'
      when: '%c'
    - spec: '%cxx=rocmcc'
      when: '%cxx'
    - spec: '%fortran=rocmcc'
      when: '%fortran'
    - spec: '%cray-mpich@8.1.29'
      when: '%mpi'

  packages:
    all:
      target: [x86_64_v3]
      providers:
        blas: [netlib-lapack]
        lapack: [netlib-lapack]
        gl: [opengl]
        glu: [openglu]
        zlib-api: [zlib]
        mpi: [cray-mpich]

    rocmcc:
      externals:
      - spec: rocmcc@6.2.1
        prefix: /opt/rocm-6.2.1/llvm
        extra_attributes:
          compilers:
            c: /opt/rocm-6.2.1/llvm/bin/amdclang
            cxx: /opt/rocm-6.2.1/llvm/bin/amdclang++
            fortran: /opt/rocm-6.2.1/llvm/bin/amdflang

    # Providers
    netlib-lapack:
      buildable: false
      externals:
      - spec: netlib-lapack@3.6.1
        prefix: /usr
    opengl:
      buildable: false
      externals:
      - spec: opengl@1.7.0
        prefix: /usr
    openglu:
      buildable: false
      externals:
      - spec: openglu@1.3.1
        prefix: /usr
    zlib:
      buildable: false
      externals:
      - spec: zlib@1.2.11
        prefix: /usr

    # Lock down which MPI we are using
    mpi:
      buildable: false
    cray-mpich:
      buildable: false
      externals:
      - spec: cray-mpich@8.1.29%rocmcc@6.2.1
        prefix: /usr/tce/packages/cray-mpich-tce/cray-mpich-8.1.29-rocmcc-6.2.1/

    # ROCm
    hip:
      buildable: false
      externals:
      - spec: hip@6.2.1
        prefix: /opt/rocm-6.2.1
    hipblas:
      buildable: false
      externals:
      - spec: hipblas@6.2.1
        prefix: /opt/rocm-6.2.1/
    hipsparse:
      buildable: false
      externals:
      - spec: hipsparse@6.2.1
        prefix: /opt/rocm-6.2.1/
    llvm-amdgpu:
      buildable: false
      externals:
      - spec: llvm-amdgpu@6.2.1
        prefix: /opt/rocm-6.2.1/llvm
    hsa-rocr-dev:
      buildable: false
      externals:
      - spec: hsa-rocr-dev@6.2.1
        prefix: /opt/rocm-6.2.1/
    rocblas:
      buildable: false
      externals:
      - spec: rocblas@6.2.1
        prefix: /opt/rocm-6.2.1/
    rocm-core:
      buildable: false
      externals:
      - spec: rocm-core@6.2.1
        prefix: /opt/rocm-6.2.1/
    rocrand:
      buildable: false
      externals:
      - spec: rocrand@6.2.1
        prefix: /opt/rocm-6.2.1/
    rocminfo:
      buildable: false
      externals:
      - spec: rocminfo@6.2.1
        prefix: /opt/rocm-6.2.1/
    rocsolver:
      buildable: false
      externals:
      - spec: rocsolver@6.2.1
        prefix: /opt/rocm-6.2.1/
    rocsparse:
      buildable: false
      externals:
      - spec: rocsparse@6.2.1
        prefix: /opt/rocm-6.2.1/
    rocthrust:
      buildable: false
      externals:
      - spec: rocthrust@6.2.1
        prefix: /opt/rocm-6.2.1/
    rocprim:
      buildable: false
      externals:
      - spec: rocprim@6.2.1
        prefix: /opt/rocm-6.2.1/
    rocm-device-libs:
      buildable: false
      externals:
      - spec: rocm-device-libs@6.2.1
        prefix: /opt/rocm-6.2.1/

    # System level packages to not build
    autoconf:
      buildable: false
      externals:
      - spec: autoconf@2.69
        prefix: /usr
    automake:
      buildable: false
      externals:
