spack:
  config:
    install_tree:
      root: $spack/..
      projections:
        all: '{compiler.name}-{compiler.version}/{name}-{version}-{hash}'
    misc_cache: $spack/../misc_cache
    test_stage: $spack/../test_stage
    build_stage::
    - $spack/../build_stage

  toolchains:
    clang_19:
    - spec: '%c=llvm'
      when: '%c'
    - spec: '%cxx=llvm'
      when: '%cxx'
    - spec: '%fortran=gcc'
      when: '%fortran'
    - spec: '%mpich@4.0.clang_19'
      when: '%mpi'
    gcc_14:
    - spec: '%c=gcc'
      when: '%c'
    - spec: '%cxx=gcc'
      when: '%cxx'
    - spec: '%fortran=gcc'
      when: '%fortran'
    - spec: '%mpich@4.0.gcc_14'
      when: '%mpi'
    gcc_13:
    - spec: '%c=gcc'
      when: '%c'
    - spec: '%cxx=gcc'
      when: '%cxx'
    - spec: '%fortran=gcc'
      when: '%fortran'
    - spec: '%mpich@4.0.gcc_13'
      when: '%mpi'

  # Regular TPLs do not need views
  view: false

  include:
    - ../defaults.yaml
    - ../versions.yaml

  packages:
    all:
      target: [x86_64]
      compiler: [gcc, intel, pgi, clang, xl, nag]
      providers:
        awk: [gawk]
        blas: [openblas]
        lapack: [openblas]
        daal: [intel-daal]
        elf: [elfutils]
        golang: [gcc]
        ipp: [intel-ipp]
        java: [jdk]
        mkl: [intel-mkl]
        mpe: [mpe2]
        mpi: [mpich]
        opencl: [pocl]
        openfoam: [openfoam-com, openfoam-org, foam-extend]
        pil: [py-pillow]
        scalapack: [netlib-scalapack]
        szip: [libszip, libaec]
        tbb: [intel-tbb]
        jpeg: [libjpeg-turbo, libjpeg]

    #Compiler packages
    gcc:
      externals:
      - spec: gcc@13.3.0 languages:=c,c++,fortran
        prefix: /usr/bin
        extra_attributes:
          compilers:
            c: /usr/bin/gcc
            cxx: /usr/bin/g++
            fortran: /usr/bin/gfortran
          flags:
            cflags: -pthread
            cxxflags: -pthread
      - spec: gcc@14.2.0 languages:=c,c++,fortran
        prefix: /usr/bin
        extra_attributes:
          compilers:
            c: /usr/bin/gcc
            cxx: /usr/bin/g++
            fortran: /usr/bin/gfortran
          flags:
            cflags: -pthread
            cxxflags: -pthread
    llvm:
      externals:
      - spec: llvm@19.1.1+clang~lld~lldb
        prefix: /usr/bin
        extra_attributes:
          compilers:
            c: /usr/bin/clang
            cxx: /usr/bin/clang++
          flags:
            # Axom example sidre_shocktube_F_ex doesn't link otherwise
            cflags: -fPIC -pthread
            cxxflags: -fPIC -pthread

    # Spack may grab for mpi & we don't want to use them
    mpi:
      buildable: false
    mpich:
      externals:
      - spec: mpich@4.0.clang_19
        prefix: /usr
      - spec: mpich@4.0.gcc_14
        prefix: /usr
      - spec: mpich@4.0.gcc_13
        prefix: /usr

    # System level packages to not build
    autotools:
      buildable: false
      externals:
      - spec: autotools@2.71
        prefix: /usr
    bzip2:
      buildable: false
      externals:
      - spec: bzip2@1.0.8
        prefix: /usr
    # TODO add HIP version
    cuda:
      buildable: false
      externals:
        - spec: cuda@12.8.0
          prefix: /usr/local/cuda-12.8
    curl:
      buildable: false
      externals:
      - spec: curl@8.5.0
        prefix: /usr
    diffutils:
      buildable: false
      externals:
      - spec: diffutils@3.10
        prefix: /usr
    gettext:
      buildable: false
      externals:
      - spec: gettext@0.21
        prefix: /usr
    lua:
      buildable: false
      externals:
      - spec: lua@5.2.4
        prefix: /usr
    m4:
      buildable: false
      externals:
      - spec: m4@1.4.19
        prefix: /usr
    perl:
      buildable: false
      externals:
      - spec: perl@5.38.2
        prefix: /usr
    pkg-config:
      buildable: false
      externals:
      - spec: pkg-config@1.8.1
        prefix: /usr
    tar:
      buildable: false
      externals:
      - spec: tar@1.35
        prefix: /usr
    graphviz:
      buildable: false
      externals:
      - spec: graphviz@2.43.0
        prefix: /usr
    openblas:
      buildable: false
      externals:
      - spec: openblas@0.3.26
        prefix: /usr

    # Globally lock in version of CMake
    cmake:
      version: [3.23.1]
      buildable: false
      externals:
      - spec: cmake@3.23.1
        prefix: /usr/local
    doxygen:
      version: [1.9.8]
      buildable: false
      externals:
      - spec: doxygen@1.9.8
        prefix: /usr
    py-sphinx:
      version: [4.3.2]
      buildable: false
      externals:
      - spec: py-sphinx@4.3.2
        prefix: /usr
